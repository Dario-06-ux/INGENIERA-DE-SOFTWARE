<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventario SaaS Dashboard</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-left">
            <button id="sidebar-toggle" class="icon-btn" aria-label="Toggle sidebar">&#9776;</button>
            <h1>Inventario Dashboard</h1>
        </div>
        <div class="nav-right">
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle dark mode">🌙</button>
        </div>
    </nav>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
        <ul class="menu">
            <li class="menu-item active"><a href="#" id="menu-dashboard">Dashboard</a></li>
            <li class="menu-item"><a href="#" id="menu-products">Productos</a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Dashboard Cards -->
        <section class="dashboard-cards" id="dashboard-cards">
            <div class="card" id="card-total">
                <h3>Total Productos</h3>
                <p class="value" id="total-products">0</p>
            </div>
            <div class="card" id="card-instock">
                <h3>En Stock</h3>
                <p class="value" id="in-stock">0</p>
            </div>
            <div class="card" id="card-lowstock">
                <h3>Stock Bajo</h3>
                <p class="value" id="low-stock">0</p>
            </div>
            <div class="card" id="card-value">
                <h3>Valor Total</h3>
                <p class="value" id="total-value">$0.00</p>
            </div>
        </section>

        <!-- Controls -->
        <section class="controls">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Buscar por nombre o código..." />
            </div>
            <div class="filters">
                <select id="category-filter">
                    <option value="all">Todas las categorías</option>
                </select>
                <select id="stock-filter">
                    <option value="all">Todo el stock</option>
                    <option value="low">Bajo (≤5)</option>
                    <option value="out">Sin stock</option>
                </select>
                <button id="export-csv" class="btn-primary">Exportar CSV</button>
            </div>
        </section>

        <!-- Product Table -->
        <section class="table-section">
            <table class="product-table" id="product-table">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Código</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>Cantidad</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="product-tbody">
                    <!-- Rows injected by JS -->
                </tbody>
            </table>
        </section>
    </main>

    <!-- Floating Action Button -->
    <button id="add-product-btn" class="fab" aria-label="Agregar producto">+</button>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay hidden"></div>
    <div id="product-modal" class="modal hidden" aria-modal="true" role="dialog">
        <div class="modal-header">
            <h2 id="modal-title">Agregar Producto</h2>
            <button id="modal-close" class="icon-btn" aria-label="Cerrar">&#10005;</button>
        </div>
        <form id="product-form">
            <div class="form-group">
                <label for="product-name">Nombre</label>
                <input type="text" id="product-name" required />
            </div>
            <div class="form-group">
                <label for="product-code">Código</label>
                <input type="text" id="product-code" required />
            </div>
            <div class="form-group">
                <label for="product-category">Categoría</label>
                <input type="text" id="product-category" required />
            </div>
            <div class="form-group">
                <label for="product-price">Precio</label>
                <input type="number" id="product-price" min="0" step="0.01" required />
            </div>
            <div class="form-group">
                <label for="product-quantity">Cantidad</label>
                <input type="number" id="product-quantity" min="0" required />
            </div>
            <input type="hidden" id="product-id" />
            <div class="modal-actions">
                <button type="submit" class="btn-primary" id="save-product-btn">Guardar</button>
                <button type="button" class="btn-secondary" id="cancel-product-btn">Cancelar</button>
            </div>
        </form>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="js/app.js"></script>
</body>
</html>
